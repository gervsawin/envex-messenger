<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>envex | Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            height: 100vh;
            overflow: hidden;
        }

        .auth {
            position: fixed;
            inset: 0;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            background: #131318;
            border: 1px solid #2c2c35;
            border-radius: 32px;
            padding: 48px;
            width: 420px;
        }

        .auth-logo {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: #1c1c24;
            border: 1px solid #2c2c35;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
        }

        .auth-input:focus {
            border-color: #6366f1;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
        }

        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 14px;
            cursor: pointer;
        }

        .auth-switch span {
            color: #6366f1;
        }

        .error-msg {
            color: #ef4444;
            font-size: 12px;
            margin-top: 12px;
            text-align: center;
        }

        .logout-btn {
            margin-top: 16px;
            padding: 10px;
            background: #2c2c35;
            border: none;
            border-radius: 12px;
            color: #ef4444;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
        }

        .app {
            display: none;
            width: 100%;
            height: 100%;
        }

        .container {
            display: flex;
            height: 100%;
        }

        .sidebar {
            width: 320px;
            background: #131318;
            border-right: 1px solid #2c2c35;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid #2c2c35;
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
        }

        .user-info h3 {
            color: white;
            font-size: 16px;
        }

        .user-info p {
            color: #10b981;
            font-size: 12px;
        }

        .search-box {
            margin-bottom: 12px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            background: #1c1c24;
            border: 1px solid #2c2c35;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #6366f1;
        }

        .section-title {
            padding: 16px 24px 8px 24px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.15s;
        }

        .user-item:hover {
            background: #1c1c24;
        }

        .user-item.active {
            background: #1c1c24;
            border-left: 3px solid #6366f1;
        }

        .user-avatar-side {
            width: 40px;
            height: 40px;
            background: #2c2c35;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
        }

        .user-info-side {
            flex: 1;
        }

        .user-name-side {
            color: white;
            font-weight: 500;
            font-size: 14px;
        }

        .user-nick {
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .status-dot.online {
            background: #10b981;
        }

        .status-dot.offline {
            background: #6b7280;
        }

        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0f;
        }

        .chat-header {
            padding: 20px 32px;
            background: #131318;
            border-bottom: 1px solid #2c2c35;
        }

        .chat-header h2 {
            color: white;
            font-size: 18px;
        }

        .chat-header p {
            color: #6b7280;
            font-size: 12px;
            margin-top: 4px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            max-width: 70%;
            position: relative;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #6366f1;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: #1c1c24;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 14px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 4px;
            font-size: 10px;
            opacity: 0.7;
        }

        .input-area {
            padding: 20px 32px;
            background: #131318;
            border-top: 1px solid #2c2c35;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: #1c1c24;
            border: 1px solid #2c2c35;
            border-radius: 24px;
            padding: 8px 16px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .input-wrapper button {
            background: #6366f1;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .empty-state {
            text-align: center;
            color: #6b7280;
            padding: 40px;
        }

        .loading {
            text-align: center;
            color: #6366f1;
            padding: 40px;
        }
    </style>
</head>
<body>

<div class="auth" id="authScreen">
    <div class="auth-card">
        <div class="auth-logo">envex</div>
        <input type="text" id="authUsername" class="auth-input" placeholder="@username (например @alex)" autocomplete="off">
        <input type="password" id="authPassword" class="auth-input" placeholder="Пароль">
        <input type="text" id="authName" class="auth-input" placeholder="Ваше имя" style="display: none;">
        <button id="authSubmitBtn" class="auth-btn">Войти</button>
        <div class="auth-switch" id="authSwitch">Нет аккаунта? <span>Создать</span></div>
        <div class="error-msg" id="errorMsg"></div>
    </div>
</div>

<div class="app" id="appScreen">
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="current-user">
                    <div class="avatar" id="userAvatar">?</div>
                    <div class="user-info">
                        <h3 id="userName"></h3>
                        <p id="userStatus">онлайн</p>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" id="searchUsers" placeholder="🔍 Поиск по @username...">
                </div>
                <button id="logoutBtn" class="logout-btn">🚪 Выйти из аккаунта</button>
            </div>
            <div class="section-title">Пользователи</div>
            <div class="users-list" id="usersList">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
        
        <div class="chat">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <h2 id="chatUserName"></h2>
                <p id="chatUserStatus"></p>
            </div>
            <div class="messages" id="messagesList">
                <div class="empty-state">👈 Выберите собеседника</div>
            </div>
            <div class="input-area" id="inputArea" style="display: none;">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let ws = null;
    let currentUser = null;
    let currentChatWith = null;
    let allUsers = [];
    let allMessages = {};
    let isLoginMode = true;
    let isConnecting = false;

    // Ключи для localStorage
    const STORAGE_KEYS = {
        SESSION: 'envex_session',
        USERNAME: 'envex_username',
        PASSWORD: 'envex_password',
        NAME: 'envex_name'
    };

    const authScreen = document.getElementById('authScreen');
    const appScreen = document.getElementById('appScreen');
    const authUsername = document.getElementById('authUsername');
    const authPassword = document.getElementById('authPassword');
    const authName = document.getElementById('authName');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const authSwitch = document.getElementById('authSwitch');
    const errorMsg = document.getElementById('errorMsg');
    const userNameSpan = document.getElementById('userName');
    const userAvatar = document.getElementById('userAvatar');
    const usersList = document.getElementById('usersList');
    const searchUsers = document.getElementById('searchUsers');
    const chatHeader = document.getElementById('chatHeader');
    const chatUserName = document.getElementById('chatUserName');
    const chatUserStatus = document.getElementById('chatUserStatus');
    const messagesList = document.getElementById('messagesList');
    const inputArea = document.getElementById('inputArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    function showError(msg) {
        errorMsg.textContent = msg;
        setTimeout(() => { errorMsg.textContent = ''; }, 3000);
    }

    function getWebSocketUrl() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.host;
        return `${protocol}//${host}`;
    }

    // Сохранение сессии
    function saveSession(username, password, name) {
        localStorage.setItem(STORAGE_KEYS.SESSION, 'true');
        localStorage.setItem(STORAGE_KEYS.USERNAME, username);
        localStorage.setItem(STORAGE_KEYS.PASSWORD, password);
        localStorage.setItem(STORAGE_KEYS.NAME, name);
    }

    // Очистка сессии (выход)
    function clearSession() {
        localStorage.removeItem(STORAGE_KEYS.SESSION);
        localStorage.removeItem(STORAGE_KEYS.USERNAME);
        localStorage.removeItem(STORAGE_KEYS.PASSWORD);
        localStorage.removeItem(STORAGE_KEYS.NAME);
        
        if (ws) {
            ws.close();
        }
        
        currentUser = null;
        currentChatWith = null;
        allUsers = [];
        allMessages = {};
        
        authUsername.value = '';
        authPassword.value = '';
        authName.value = '';
        
        authScreen.style.display = 'flex';
        appScreen.style.display = 'none';
        
        isLoginMode = true;
        authSubmitBtn.textContent = 'Войти';
        authSwitch.innerHTML = 'Нет аккаунта? <span>Создать</span>';
        authName.style.display = 'none';
    }

    // Проверка сохранённой сессии
    function checkSavedSession() {
        const hasSession = localStorage.getItem(STORAGE_KEYS.SESSION);
        if (hasSession === 'true') {
            const savedUsername = localStorage.getItem(STORAGE_KEYS.USERNAME);
            const savedPassword = localStorage.getItem(STORAGE_KEYS.PASSWORD);
            const savedName = localStorage.getItem(STORAGE_KEYS.NAME);
            
            if (savedUsername && savedPassword) {
                console.log('Найдена сохранённая сессия для:', savedUsername);
                connectAndAuth('login', savedUsername, savedPassword, savedName);
                return true;
            }
        }
        return false;
    }

    function connectAndAuth(type, username, password, name) {
        if (isConnecting) return;
        isConnecting = true;
        authSubmitBtn.disabled = true;
        authSubmitBtn.textContent = 'Подключение...';
        
        const wsUrl = getWebSocketUrl();
        console.log('Подключение к:', wsUrl);
        
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
            console.log('WebSocket открыт, отправка аутентификации');
            if (type === 'login') {
                ws.send(JSON.stringify({ type: 'login', username, password }));
            } else {
                ws.send(JSON.stringify({ type: 'register', username, password, name: name || username.substring(1) }));
            }
        };
        
        ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                console.log('Получено:', data.type);
                
                if (data.type === 'logged_in') {
                    currentUser = data.username;
                    userNameSpan.textContent = data.name;
                    userAvatar.textContent = data.name.charAt(0).toUpperCase();
                    authScreen.style.display = 'none';
                    appScreen.style.display = 'block';
                    isConnecting = false;
                    authSubmitBtn.disabled = false;
                    
                    // Сохраняем сессию
                    saveSession(username, password, data.name);
                }
                
                if (data.type === 'registered') {
                    currentUser = data.username;
                    userNameSpan.textContent = data.name;
                    userAvatar.textContent = data.name.charAt(0).toUpperCase();
                    authScreen.style.display = 'none';
                    appScreen.style.display = 'block';
                    isConnecting = false;
                    authSubmitBtn.disabled = false;
                    
                    // Сохраняем сессию
                    saveSession(username, password, data.name);
                }
                
                if (data.type === 'users') {
                    allUsers = data.users;
                    renderUsers();
                }
                
                if (data.type === 'history') {
                    allMessages = {};
                    data.messages.forEach(msg => {
                        const chatId = msg.from === currentUser ? msg.to : msg.from;
                        if (!allMessages[chatId]) allMessages[chatId] = [];
                        allMessages[chatId].push(msg);
                    });
                    if (currentChatWith) renderMessages();
                }
                
                if (data.type === 'new_message') {
                    const msg = data.message;
                    const chatId = msg.from === currentUser ? msg.to : msg.from;
                    if (!allMessages[chatId]) allMessages[chatId] = [];
                    allMessages[chatId].push(msg);
                    if (currentChatWith === chatId) renderMessages();
                    if (msg.from !== currentUser && document.hidden) {
                        new Notification('envex', { body: `${msg.from}: ${msg.text}` });
                    }
                }
                
                if (data.type === 'message_read') {
                    for (const chatId in allMessages) {
                        const msg = allMessages[chatId].find(m => m.id === data.messageId);
                        if (msg) { msg.read = true; msg.status = 'read'; break; }
                    }
                    if (currentChatWith) renderMessages();
                }
                
                if (data.type === 'message_edited') {
                    for (const chatId in allMessages) {
                        const msg = allMessages[chatId].find(m => m.id === data.messageId);
                        if (msg) { msg.text = data.newText; msg.edited = true; break; }
                    }
                    if (currentChatWith) renderMessages();
                }
                
                if (data.type === 'message_deleted') {
                    for (const chatId in allMessages) {
                        const msg = allMessages[chatId].find(m => m.id === data.messageId);
                        if (msg) { msg.text = '[Удалено]'; msg.deleted = true; break; }
                    }
                    if (currentChatWith) renderMessages();
                }
                
                if (data.type === 'error') {
                    showError(data.text);
                    isConnecting = false;
                    authSubmitBtn.disabled = false;
                    authSubmitBtn.textContent = isLoginMode ? 'Войти' : 'Создать аккаунт';
                    
                    // Если ошибка входа при сохранённой сессии — очищаем её
                    if (data.text === 'Пользователь не найден' || data.text === 'Неверный пароль') {
                        clearSession();
                    }
                }
            } catch(e) { console.error('Ошибка парсинга:', e); }
        };
        
        ws.onerror = (err) => {
            console.error('WebSocket ошибка:', err);
            showError('Ошибка подключения к серверу. Проверьте что сервер запущен.');
            isConnecting = false;
            authSubmitBtn.disabled = false;
            authSubmitBtn.textContent = isLoginMode ? 'Войти' : 'Создать аккаунт';
        };
        
        ws.onclose = () => {
            console.log('WebSocket закрыт');
            if (currentUser) {
                setTimeout(() => {
                    const savedUsername = localStorage.getItem(STORAGE_KEYS.USERNAME);
                    const savedPassword = localStorage.getItem(STORAGE_KEYS.PASSWORD);
                    if (savedUsername && savedPassword) {
                        connectAndAuth('login', savedUsername, savedPassword, '');
                    }
                }, 3000);
            }
        };
    }
    
    function renderUsers() {
        const searchTerm = searchUsers.value.toLowerCase();
        let filtered = allUsers.filter(u => u.username !== currentUser);
        
        if (searchTerm) {
            filtered = filtered.filter(u => u.username.toLowerCase().includes(searchTerm));
        }
        
        if (filtered.length === 0) {
            usersList.innerHTML = '<div class="empty-state">👀 Никого не найдено</div>';
            return;
        }
        
        usersList.innerHTML = filtered.map(user => `
            <div class="user-item ${currentChatWith === user.username ? 'active' : ''}" onclick="selectUser('${user.username}')">
                <div class="user-avatar-side">${(user.name || user.username.substring(1)).charAt(0).toUpperCase()}</div>
                <div class="user-info-side">
                    <div class="user-name-side">${user.name || user.username.substring(1)}</div>
                    <div class="user-nick">${user.username}</div>
                    <div style="font-size: 10px; margin-top: 2px;">
                        <span class="status-dot ${user.online ? 'online' : 'offline'}"></span>
                        ${user.online ? 'онлайн' : 'оффлайн'}
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    window.selectUser = (user) => {
        currentChatWith = user;
        chatHeader.style.display = 'block';
        inputArea.style.display = 'flex';
        
        const userData = allUsers.find(u => u.username === user);
        chatUserName.textContent = userData?.name || user.substring(1);
        chatUserStatus.innerHTML = userData?.online 
            ? '<span class="status-dot online"></span> онлайн'
            : '<span class="status-dot offline"></span> оффлайн';
        
        renderUsers();
        renderMessages();
    };
    
    function renderMessages() {
        const msgs = allMessages[currentChatWith] || [];
        if (msgs.length === 0) {
            messagesList.innerHTML = '<div class="empty-state">💬 Нет сообщений</div>';
            return;
        }
        
        messagesList.innerHTML = msgs.map(msg => {
            const isSent = msg.from === currentUser;
            let statusIcon = '';
            if (isSent) {
                if (msg.status === 'sent') statusIcon = '✓';
                else if (msg.status === 'delivered') statusIcon = '✓✓';
                else if (msg.status === 'read') statusIcon = '✓✓✓';
            }
            
            return `
                <div class="message ${isSent ? 'sent' : 'received'}">
                    <div class="bubble">
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-meta">
                            <span>${msg.timeStr || msg.time}</span>
                            ${statusIcon ? `<span>${statusIcon}</span>` : ''}
                            ${msg.edited ? '<span>ред.</span>' : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        messagesList.scrollTop = messagesList.scrollHeight;
        
        // Отметить как прочитанные
        msgs.forEach(msg => {
            if (!msg.read && msg.from !== currentUser && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'read', messageId: msg.id }));
            }
        });
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !currentChatWith || !ws || ws.readyState !== WebSocket.OPEN) return;
        
        ws.send(JSON.stringify({
            type: 'message',
            to: currentChatWith,
            text: text
        }));
        
        messageInput.value = '';
    }
    
    // Выход из аккаунта
    logoutBtn.onclick = () => {
        if (confirm('Выйти из аккаунта? При следующем входе нужно будет ввести пароль.')) {
            clearSession();
        }
    };
    
    authSwitch.onclick = () => {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
            authSubmitBtn.textContent = 'Войти';
            authSwitch.innerHTML = 'Нет аккаунта? <span>Создать</span>';
            authName.style.display = 'none';
        } else {
            authSubmitBtn.textContent = 'Создать аккаунт';
            authSwitch.innerHTML = 'Уже есть аккаунт? <span>Войти</span>';
            authName.style.display = 'block';
        }
        errorMsg.textContent = '';
    };
    
    authSubmitBtn.onclick = () => {
        const username = authUsername.value.trim();
        const password = authPassword.value;
        const name = authName.value.trim();
        
        if (!username || !password) {
            showError('Заполните все поля');
            return;
        }
        
        if (!username.startsWith('@')) {
            showError('Username должен начинаться с @ (например @alex)');
            return;
        }
        
        if (!isLoginMode && !name) {
            showError('Введите ваше имя');
            return;
        }
        
        if (isLoginMode) {
            connectAndAuth('login', username, password, '');
        } else {
            connectAndAuth('register', username, password, name);
        }
    };
    
    sendBtn.onclick = sendMessage;
    messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    searchUsers.oninput = renderUsers;
    
    if (Notification.permission === 'default') Notification.requestPermission();
    
    // При загрузке страницы проверяем сохранённую сессию
    checkSavedSession();
</script>
</body>
</html>
