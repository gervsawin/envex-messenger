<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>envex — мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ТЕМЫ */
        :root {
            --bg: #0a0a0f;
            --bg-side: #0f0f14;
            --bg-card: #16161c;
            --border: #20202a;
            --border-light: #2a2a35;
            --text: #ffffff;
            --text-secondary: #8a8a99;
            --text-tertiary: #5a5a6e;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --accent-glow: rgba(59, 130, 246, 0.2);
            --sent: #3b82f6;
            --received: #1e1e28;
            --online: #22c55e;
            --offline: #5a5a6e;
            --hover: #1a1a22;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        body.light {
            --bg: #f5f5f8;
            --bg-side: #ffffff;
            --bg-card: #eef2f5;
            --border: #e2e5e9;
            --border-light: #eef2f5;
            --text: #1a1a2e;
            --text-secondary: #6a6a7e;
            --text-tertiary: #9a9aae;
            --accent: #3b82f6;
            --received: #eef2f5;
            --hover: #e8ecf0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            font-size: 14px;
            line-height: 1.5;
        }

        /* АНИМАЦИИ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-16px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* AUTH */
        .auth {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 48px 40px;
            width: 420px;
            border: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
            box-shadow: var(--shadow);
        }

        .auth-logo {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.2s;
        }

        .auth-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-btn:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .auth-switch:hover { color: var(--accent); }
        .auth-switch span { color: var(--accent); }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 16px;
            text-align: center;
        }

        /* MAIN APP */
        .app {
            display: none;
            width: 100%;
            height: 100%;
        }

        .main-layout {
            display: flex;
            height: 100%;
        }

        /* SIDEBAR */
        .sidebar {
            width: 320px;
            background: var(--bg-side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 20px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            transition: transform 0.2s;
        }

        .avatar:hover { transform: scale(1.02); }

        .user-text h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .user-text p {
            font-size: 12px;
            color: var(--online);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--online);
            border-radius: 50%;
            display: inline-block;
        }

        .search-box {
            margin-bottom: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--hover);
            transform: translateY(-1px);
        }

        .logout-btn {
            color: #ef4444;
        }

        .section-title {
            padding: 16px 20px 8px 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
        }

        .chats-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 10px 16px;
            margin: 4px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-radius: 14px;
            transition: all 0.15s;
        }

        .chat-item:hover {
            background: var(--hover);
        }

        .chat-item.active {
            background: var(--bg-card);
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            background: var(--bg-card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 500;
            background-size: cover;
            background-position: center;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .chat-status {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* PUBLIC FEED */
        .public-feed {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .feed-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
        }

        .feed-header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .feed-header p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .feed-posts {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 16px;
            background-size: cover;
            background-position: center;
        }

        .post-author h4 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .post-author span {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .post-content {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .post-content img {
            max-width: 100%;
            border-radius: 14px;
            margin-top: 10px;
        }

        .post-actions {
            display: flex;
            gap: 24px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .post-action:hover {
            color: var(--accent);
        }

        .feed-input {
            padding: 16px 28px 24px 28px;
            background: var(--bg-side);
            border-top: 1px solid var(--border);
        }

        .feed-input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 6px 12px;
        }

        .feed-input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            outline: none;
            font-size: 14px;
            padding: 10px 8px;
        }

        .feed-input-wrapper input::placeholder {
            color: var(--text-tertiary);
        }

        .feed-send-btn {
            background: var(--accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .feed-send-btn:hover {
            background: var(--accent-dark);
            transform: scale(0.96);
        }

        .attach-feed {
            background: var(--bg-card);
            border: 1px solid var(--border);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .attach-feed:hover {
            background: var(--hover);
        }

        /* CHAT PANEL */
        .chat-panel {
            flex: 1;
            display: none;
            flex-direction: column;
            background: var(--bg);
        }

        .chat-panel.active {
            display: flex;
        }

        .public-feed.hide {
            display: none;
        }

        .chat-panel-header {
            padding: 16px 24px;
            background: var(--bg-side);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-to-feed {
            width: 36px;
            height: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .back-to-feed:hover {
            background: var(--hover);
        }

        .chat-panel-header h2 {
            font-size: 17px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            max-width: 70%;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 20px;
        }

        .sent .bubble {
            background: var(--sent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: var(--received);
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.45;
        }

        .message-text img {
            max-width: 200px;
            border-radius: 12px;
            margin-top: 6px;
            cursor: pointer;
        }

        .message-meta {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 6px;
            font-size: 10px;
            opacity: 0.6;
        }

        .chat-input-area {
            padding: 16px 20px;
            background: var(--bg-side);
            border-top: 1px solid var(--border);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 6px 12px;
        }

        .chat-input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            outline: none;
            font-size: 14px;
            padding: 10px 8px;
        }

        .chat-input-wrapper input::placeholder {
            color: var(--text-tertiary);
        }

        .chat-send-btn {
            background: var(--accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .chat-send-btn:hover {
            background: var(--accent-dark);
            transform: scale(0.96);
        }

        .chat-attach-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .chat-attach-btn:hover {
            background: var(--hover);
        }

        .empty-state {
            text-align: center;
            color: var(--text-tertiary);
            padding: 48px 20px;
        }

        /* MODALS */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            width: 100%;
            max-width: 360px;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--bg);
            margin: 0 auto 20px;
            background-size: cover;
            background-position: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            border-radius: 26px;
            transition: 0.2s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .back-to-feed {
                display: flex;
            }

            .message {
                max-width: 85%;
            }

            .feed-posts {
                padding: 16px;
            }

            .feed-header {
                padding: 16px 20px;
            }

            .feed-input {
                padding: 12px 20px 20px 20px;
            }
        }
    </style>
</head>
<body>

<div class="auth" id="authScreen">
    <div class="auth-card">
        <div class="auth-logo">envex</div>
        <input type="text" id="authUsername" class="auth-input" placeholder="username" autocomplete="off">
        <input type="password" id="authPassword" class="auth-input" placeholder="Пароль">
        <input type="text" id="authName" class="auth-input" placeholder="Ваше имя" style="display: none;">
        <button id="authSubmitBtn" class="auth-btn">Войти</button>
        <div class="auth-switch" id="authSwitch">Нет аккаунта? <span>Создать</span></div>
        <div class="error-msg" id="errorMsg"></div>
    </div>
</div>

<div class="app" id="appScreen">
    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-card">
                    <div class="avatar" id="userAvatar" onclick="openProfileModal()">?</div>
                    <div class="user-text">
                        <h3 id="userName"></h3>
                        <p><span class="online-dot"></span> онлайн</p>
                    </div>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Поиск">
                </div>
                <div class="action-buttons">
                    <button class="action-btn" id="createGroupBtn">Группа</button>
                    <button class="action-btn" id="settingsBtn">Настройки</button>
                    <button class="action-btn logout-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>
            <div class="section-title">Чаты</div>
            <div class="chats-scroll" id="chatsList"></div>
        </div>

        <div class="public-feed" id="publicFeed">
            <div class="feed-header">
                <h1>Лента</h1>
                <p>Публичные сообщения</p>
            </div>
            <div class="feed-posts" id="feedPosts">
                <div class="empty-state">Нет сообщений</div>
            </div>
            <div class="feed-input">
                <div class="feed-input-wrapper">
                    <button class="attach-feed" id="feedAttachBtn">+</button>
                    <input type="text" id="feedInput" placeholder="Что нового?">
                    <button class="feed-send-btn" id="feedSendBtn">→</button>
                </div>
            </div>
        </div>

        <div class="chat-panel" id="chatPanel">
            <div class="chat-panel-header">
                <div class="back-to-feed" id="backToFeedBtn">←</div>
                <h2 id="chatName"></h2>
            </div>
            <div class="chat-messages" id="messagesList">
                <div class="empty-state">Выберите чат</div>
            </div>
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <button class="chat-attach-btn" id="chatAttachBtn">+</button>
                    <input type="text" id="messageInput" placeholder="Сообщение">
                    <button class="chat-send-btn" id="sendBtn">→</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Настройки</div>
        <div class="setting-row">
            <span>Тёмный режим</span>
            <label class="switch"><input type="checkbox" id="themeToggle"><span class="slider"></span></label>
        </div>
        <div class="setting-row">
            <span>Уведомления</span>
            <label class="switch"><input type="checkbox" id="notifToggle" checked><span class="slider"></span></label>
        </div>
        <button id="closeSettingsBtn" class="auth-btn" style="margin-top: 20px;">Закрыть</button>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Профиль</div>
        <div class="avatar-preview" id="profileAvatarPreview"></div>
        <input type="text" id="profileName" class="auth-input" placeholder="Имя">
        <input type="text" id="profileUsername" class="auth-input" placeholder="username" readonly style="opacity:0.6">
        <input type="file" id="profileAvatarInput" accept="image/*" style="display: none;">
        <button id="uploadProfileBtn" class="auth-btn" style="margin-bottom: 10px;">Сменить фото</button>
        <button id="saveProfileBtn" class="auth-btn">Сохранить</button>
        <button id="closeProfileModal" class="auth-btn" style="margin-top: 10px; background: var(--bg); color: var(--text);">Отмена</button>
    </div>
</div>

<div id="groupModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Создать группу</div>
        <input type="text" id="groupName" class="auth-input" placeholder="Название группы">
        <div class="section-title" style="margin: 16px 0 8px 0;">Участники</div>
        <div id="groupMembersList" style="max-height: 200px; overflow-y: auto;"></div>
        <button id="createGroupConfirm" class="auth-btn">Создать</button>
        <button id="closeGroupModal" class="auth-btn" style="margin-top: 10px; background: var(--bg); color: var(--text);">Отмена</button>
    </div>
</div>

<script>
    // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
    let ws = null;
    let currentUser = null;
    let currentChat = null;
    let allUsers = [];
    let allGroups = [];
    let allChannels = [];
    let allMessages = {};
    let allPosts = [];
    let isLoginMode = true;
    let isConnecting = false;
    let reconnectTimer = null;

    const SESSION_KEY = 'envex_user_data';

    // ============ РАБОТА С СЕССИЕЙ ============
    function saveUserData(username, password, name, avatar) {
        localStorage.setItem(SESSION_KEY, JSON.stringify({ username, password, name, avatar, savedAt: Date.now() }));
    }

    function loadUserData() {
        try {
            const data = JSON.parse(localStorage.getItem(SESSION_KEY));
            if (data && Date.now() - data.savedAt < 30 * 24 * 60 * 60 * 1000) return data;
            localStorage.removeItem(SESSION_KEY);
            return null;
        } catch(e) { return null; }
    }

    function clearUserData() { localStorage.removeItem(SESSION_KEY); if(reconnectTimer) clearTimeout(reconnectTimer); }

    // ============ ВСПОМОГАТЕЛЬНЫЕ ============
    function showError(msg) {
        const err = document.getElementById('errorMsg');
        if(err) { err.textContent = msg; setTimeout(() => err.textContent = '', 3000); }
    }

    function getWebSocketUrl() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${protocol}//${window.location.host}`;
    }

    function formatLastSeen(ts) {
        if(!ts) return 'никогда';
        const min = Math.floor((Date.now() - ts) / 60000);
        if(min < 1) return 'только что';
        if(min < 60) return `${min} мин`;
        if(min < 1440) return `${Math.floor(min / 60)} ч`;
        return `${Math.floor(min / 1440)} д`;
    }

    // ============ WEBSOCKET ============
    function connectAndAuth(type, username, password, name) {
        if(isConnecting) return;
        isConnecting = true;
        const btn = document.getElementById('authSubmitBtn');
        if(btn) { btn.disabled = true; btn.textContent = 'Подключение...'; }
        
        if(ws) try { ws.close(); } catch(e) {}
        
        ws = new WebSocket(getWebSocketUrl());
        
        ws.onopen = () => {
            if(type === 'login') ws.send(JSON.stringify({ type: 'login', username, password }));
            else ws.send(JSON.stringify({ type: 'register', username, password, name: name || username.substring(1) }));
        };
        
        ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                
                if(data.type === 'logged_in' || data.type === 'registered') {
                    currentUser = data.username;
                    document.getElementById('userName').textContent = data.name;
                    const av = document.getElementById('userAvatar');
                    if(data.avatar) { av.style.backgroundImage = `url(${data.avatar})`; av.textContent = ''; }
                    else { av.style.backgroundImage = ''; av.textContent = data.name.charAt(0).toUpperCase(); }
                    saveUserData(username, password, data.name, data.avatar);
                    document.getElementById('authScreen').style.display = 'none';
                    document.getElementById('appScreen').style.display = 'block';
                    isConnecting = false;
                    if(btn) btn.disabled = false;
                }
                
                if(data.type === 'users') { allUsers = data.users; renderChats(); }
                if(data.type === 'groups') { allGroups = data.groups; renderGroups(); }
                if(data.type === 'channels') { allChannels = data.channels; renderChannels(); }
                
                if(data.type === 'posts') { allPosts = data.posts; renderFeed(); }
                if(data.type === 'new_post') { allPosts.unshift(data.post); renderFeed(); }
                
                if(data.type === 'history') {
                    allMessages = {};
                    data.messages.forEach(msg => {
                        const id = msg.isGroup ? msg.to : (msg.from === currentUser ? msg.to : msg.from);
                        if(!allMessages[id]) allMessages[id] = [];
                        allMessages[id].push(msg);
                    });
                    if(currentChat) renderMessages();
                }
                
                if(data.type === 'new_message') {
                    const msg = data.message;
                    const id = msg.isGroup ? msg.to : (msg.from === currentUser ? msg.to : msg.from);
                    if(!allMessages[id]) allMessages[id] = [];
                    allMessages[id].push(msg);
                    if(currentChat && currentChat.id === id) renderMessages();
                    renderChats();
                    if(document.getElementById('notifToggle').checked && document.hidden) {
                        new Notification('envex', { body: `${msg.from}: ${msg.text.substring(0, 50)}` });
                    }
                }
                
                if(data.type === 'error') { showError(data.text); isConnecting = false; if(btn) btn.disabled = false; }
            } catch(e) { console.error(e); }
        };
        
        ws.onerror = () => { showError('Ошибка подключения'); isConnecting = false; if(btn) btn.disabled = false; };
        
        ws.onclose = () => {
            if(currentUser) {
                reconnectTimer = setTimeout(() => {
                    const saved = loadUserData();
                    if(saved) connectAndAuth('login', saved.username, saved.password, saved.name);
                }, 2000);
            }
        };
    }
    
    function checkSavedSession() {
        const saved = loadUserData();
        if(saved) { connectAndAuth('login', saved.username, saved.password, saved.name); return true; }
        return false;
    }

    // ============ RENDER ФУНКЦИИ ============
    function renderChats() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        let chats = [];
        allUsers.filter(u => u.username !== currentUser).forEach(u => {
            if(!term || u.username.includes(term) || u.name.toLowerCase().includes(term)) {
                chats.push({ type: 'user', id: u.username, name: u.name, avatar: u.avatar, online: u.online, lastSeen: u.lastSeen });
            }
        });
        const container = document.getElementById('chatsList');
        if(chats.length === 0) { container.innerHTML = '<div class="empty-state">Нет контактов</div>'; return; }
        container.innerHTML = chats.map(c => `
            <div class="chat-item ${currentChat?.id === c.id ? 'active' : ''}" onclick="selectChat('user','${c.id}','${c.name.replace(/'/g,"\\'")}')">
                <div class="chat-avatar" style="${c.avatar ? `background-image:url(${c.avatar});background-size:cover;` : ''}">${!c.avatar ? (c.name.charAt(0) || 'U').toUpperCase() : ''}</div>
                <div class="chat-info">
                    <div class="chat-name">${c.name}</div>
                    <div class="chat-status">${c.online ? 'онлайн' : `был ${formatLastSeen(c.lastSeen)}`}</div>
                </div>
            </div>
        `).join('');
    }
    
    function renderGroups() {
        const container = document.getElementById('groupsList');
        if(!container) return;
        if(!allGroups.length) { container.innerHTML = '<div class="empty-state">Нет групп</div>'; return; }
        container.innerHTML = allGroups.map(g => `
            <div class="chat-item ${currentChat?.id === g.id ? 'active' : ''}" onclick="selectChat('group','${g.id}','${g.name.replace(/'/g,"\\'")}')">
                <div class="chat-avatar">${g.name.charAt(0).toUpperCase()}</div>
                <div class="chat-info"><div class="chat-name">${g.name}</div><div class="chat-status">${g.members.length} участников</div></div>
            </div>
        `).join('');
    }
    
    function renderChannels() {
        const container = document.getElementById('channelsList');
        if(!container) return;
        if(!allChannels.length) { container.innerHTML = '<div class="empty-state">Нет каналов</div>'; return; }
        container.innerHTML = allChannels.map(c => `
            <div class="chat-item ${currentChat?.id === c.id ? 'active' : ''}" onclick="selectChat('channel','${c.id}','${c.name.replace(/'/g,"\\'")}')">
                <div class="chat-avatar">${c.name.charAt(0).toUpperCase()}</div>
                <div class="chat-info"><div class="chat-name">${c.name}</div><div class="chat-status">${c.subscribers.length} подписчиков</div></div>
            </div>
        `).join('');
    }
    
    function renderFeed() {
        const container = document.getElementById('feedPosts');
        if(!allPosts.length) { container.innerHTML = '<div class="empty-state">Нет сообщений. Напишите первым!</div>'; return; }
        container.innerHTML = allPosts.map(p => `
            <div class="post-card">
                <div class="post-header">
                    <div class="post-avatar" style="${p.authorAvatar ? `background-image:url(${p.authorAvatar});background-size:cover;` : ''}">${!p.authorAvatar ? (p.authorName?.charAt(0) || p.author.charAt(1) || p.author.charAt(0)).toUpperCase() : ''}</div>
                    <div class="post-author">
                        <h4>${p.authorName || p.author}</h4>
                        <span>${p.timeStr || new Date(p.time).toLocaleString()}</span>
                    </div>
                </div>
                <div class="post-content">
                    ${p.isImage ? `<img src="${p.text}" alt="post" onclick="viewImage('${p.text}')">` : escapeHtml(p.text)}
                </div>
                <div class="post-actions">
                    <div class="post-action">❤️ ${p.likes || 0}</div>
                    <div class="post-action">💬 ${p.comments || 0}</div>
                </div>
            </div>
        `).join('');
    }
    
    window.selectChat = (type, id, name) => {
        currentChat = { type, id, name };
        document.getElementById('chatName').textContent = name;
        document.getElementById('publicFeed').classList.add('hide');
        document.getElementById('chatPanel').classList.add('active');
        if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
        renderChats(); renderGroups(); renderChannels(); renderMessages();
    };
    
    function renderMessages() {
        const msgs = allMessages[currentChat?.id] || [];
        const container = document.getElementById('messagesList');
        if(msgs.length === 0) { container.innerHTML = '<div class="empty-state">Нет сообщений</div>'; return; }
        container.innerHTML = msgs.map(msg => {
            const isSent = msg.from === currentUser;
            let status = '';
            if(isSent) {
                if(msg.status === 'sent') status = '✓';
                else if(msg.status === 'delivered') status = '✓✓';
                else if(msg.status === 'read') status = '✓✓✓';
            }
            return `
                <div class="message ${isSent ? 'sent' : 'received'}">
                    <div class="bubble">
                        <div class="message-text">${msg.isImage ? `<img src="${msg.text}" alt="photo" onclick="viewImage('${msg.text}')">` : escapeHtml(msg.text)}</div>
                        <div class="message-meta">
                            <span>${msg.timeStr}</span>
                            ${status ? `<span>${status}</span>` : ''}
                            ${msg.edited ? '<span>ред</span>' : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
        msgs.forEach(msg => {
            if(!msg.read && msg.from !== currentUser && ws?.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'read', messageId: msg.id }));
            }
        });
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(!text || !currentChat || !ws || ws.readyState !== WebSocket.OPEN) return;
        const isImage = text.startsWith('data:image');
        if(currentChat.type === 'user') ws.send(JSON.stringify({ type: 'message', to: currentChat.id, text, isImage }));
        else if(currentChat.type === 'group') ws.send(JSON.stringify({ type: 'group_message', groupId: currentChat.id, text, isImage }));
        else ws.send(JSON.stringify({ type: 'channel_message', channelId: currentChat.id, text, isImage }));
        input.value = '';
    }
    
    function sendPost() {
        const input = document.getElementById('feedInput');
        const text = input.value.trim();
        if(!text || !ws || ws.readyState !== WebSocket.OPEN) return;
        const isImage = text.startsWith('data:image');
        ws.send(JSON.stringify({ type: 'new_post', text, isImage }));
        input.value = '';
    }
    
    function attachPhoto(target) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    if(target === 'chat') document.getElementById('messageInput').value = ev.target.result;
                    else document.getElementById('feedInput').value = ev.target.result;
                    if(target === 'chat') sendMessage();
                    else sendPost();
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function viewImage(url) { const w = window.open(); w.document.write(`<img src="${url}" style="max-width:100%; background:black;">`); }
    
    function logout() {
        if(confirm('Выйти из аккаунта?')) {
            clearUserData();
            if(ws) ws.close();
            currentUser = null;
            currentChat = null;
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
        }
    }
    
    function toggleTheme() {
        if(document.getElementById('themeToggle').checked) { document.body.classList.add('dark'); localStorage.setItem('envex_theme', 'dark'); }
        else { document.body.classList.remove('dark'); localStorage.setItem('envex_theme', 'light'); }
    }
    
    function loadTheme() { if(localStorage.getItem('envex_theme') === 'dark') { document.getElementById('themeToggle').checked = true; document.body.classList.add('dark'); } }
    
    function openProfileModal() {
        const saved = loadUserData();
        if(saved) {
            document.getElementById('profileName').value = saved.name || '';
            document.getElementById('profileUsername').value = saved.username || '';
            const preview = document.getElementById('profileAvatarPreview');
            if(saved.avatar) { preview.style.backgroundImage = `url(${saved.avatar})`; preview.style.backgroundSize = 'cover'; }
            else { preview.style.backgroundImage = ''; preview.style.backgroundColor = 'var(--bg-card)'; }
        }
        document.getElementById('profileModal').style.display = 'flex';
    }
    
    function saveProfile() {
        const newName = document.getElementById('profileName').value.trim();
        if(!newName) return showError('Введите имя');
        if(ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'update_profile', name: newName }));
        const saved = loadUserData();
        if(saved) saveUserData(saved.username, saved.password, newName, saved.avatar);
        document.getElementById('userName').textContent = newName;
        document.getElementById('profileModal').style.display = 'none';
    }
    
    function openGroupModal() {
        const list = document.getElementById('groupMembersList');
        list.innerHTML = allUsers.filter(u => u.username !== currentUser).map(u => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border);">
                <span>${u.name || u.username}</span>
                <input type="checkbox" value="${u.username}" class="group-checkbox" style="width:18px; height:18px;">
            </div>
        `).join('');
        document.getElementById('groupModal').style.display = 'flex';
    }
    
    function createGroup() {
        const name = document.getElementById('groupName').value.trim();
        if(!name) return alert('Введите название группы');
        const members = Array.from(document.querySelectorAll('.group-checkbox:checked')).map(cb => cb.value);
        if(ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'create_group', name, members }));
        document.getElementById('groupModal').style.display = 'none';
        document.getElementById('groupName').value = '';
    }
    
    // ============ ИНИЦИАЛИЗАЦИЯ ============
    document.getElementById('authSwitch').onclick = () => {
        isLoginMode = !isLoginMode;
        const btn = document.getElementById('authSubmitBtn');
        const nameField = document.getElementById('authName');
        const sw = document.getElementById('authSwitch');
        if(isLoginMode) {
            btn.textContent = 'Войти';
            sw.innerHTML = 'Нет аккаунта? <span>Создать</span>';
            nameField.style.display = 'none';
        } else {
            btn.textContent = 'Создать аккаунт';
            sw.innerHTML = 'Уже есть аккаунт? <span>Войти</span>';
            nameField.style.display = 'block';
        }
    };
    
    document.getElementById('authSubmitBtn').onclick = () => {
        const u = document.getElementById('authUsername').value.trim();
        const p = document.getElementById('authPassword').value;
        const n = document.getElementById('authName').value.trim();
        if(!u || !p) return showError('Заполните поля');
        if(!isLoginMode && !n) return showError('Введите имя');
        connectAndAuth(isLoginMode ? 'login' : 'register', u, p, n);
    };
    
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('feedSendBtn').onclick = sendPost;
    document.getElementById('messageInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    document.getElementById('feedInput').onkeypress = (e) => { if(e.key === 'Enter') sendPost(); };
    document.getElementById('chatAttachBtn').onclick = () => attachPhoto('chat');
    document.getElementById('feedAttachBtn').onclick = () => attachPhoto('feed');
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').style.display = 'flex';
    document.getElementById('closeSettingsBtn').onclick = () => document.getElementById('settingsModal').style.display = 'none';
    document.getElementById('createGroupBtn').onclick = openGroupModal;
    document.getElementById('closeGroupModal').onclick = () => document.getElementById('groupModal').style.display = 'none';
    document.getElementById('createGroupConfirm').onclick = createGroup;
    document.getElementById('closeProfileModal').onclick = () => document.getElementById('profileModal').style.display = 'none';
    document.getElementById('uploadProfileBtn').onclick = () => document.getElementById('profileAvatarInput').click();
    document.getElementById('saveProfileBtn').onclick = saveProfile;
    document.getElementById('themeToggle').onchange = toggleTheme;
    document.getElementById('backToFeedBtn').onclick = () => {
        currentChat = null;
        document.getElementById('publicFeed').classList.remove('hide');
        document.getElementById('chatPanel').classList.remove('active');
    };
    document.getElementById('searchInput').oninput = () => { renderChats(); };
    
    document.getElementById('profileAvatarInput').onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const url = ev.target.result;
                document.getElementById('profileAvatarPreview').style.backgroundImage = `url(${url})`;
                if(ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'update_profile', avatar: url }));
                document.getElementById('userAvatar').style.backgroundImage = `url(${url})`;
                document.getElementById('userAvatar').textContent = '';
                const saved = loadUserData();
                if(saved) saveUserData(saved.username, saved.password, saved.name, url);
            };
            reader.readAsDataURL(file);
        }
    };
    
    if(Notification.permission === 'default') Notification.requestPermission();
    loadTheme();
    checkSavedSession();
</script>
</body>
</html>
