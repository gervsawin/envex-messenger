<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>envex — мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #e9e9ef;
            --border: #e2e2e8;
            --text: #1c1c1e;
            --text-secondary: #8e8e93;
            --accent: #007aff;
            --sent: #007aff;
            --received: #e9e9ef;
            --online: #34c759;
        }

        body.dark {
            --bg: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --border: #38383a;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --accent: #0a84ff;
            --sent: #0a84ff;
            --received: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* Auth */
        .auth {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 40px 24px;
            width: 100%;
            max-width: 380px;
        }

        .auth-logo {
            font-size: 44px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 14px;
            color: var(--text);
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
        }

        .auth-switch span { color: var(--accent); font-weight: 500; }

        .error-msg {
            color: #ff3b30;
            font-size: 12px;
            margin-top: 12px;
            text-align: center;
        }

        /* App */
        .app {
            display: none;
            width: 100%;
            height: 100%;
        }

        /* На телефоне — одна колонка */
        .container {
            display: flex;
            height: 100%;
        }

        /* Список чатов */
        .chats-panel {
            width: 100%;
            max-width: 360px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 20px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
        }

        .user-info h3 { font-size: 17px; font-weight: 600; }
        .user-info p { font-size: 12px; color: var(--online); margin-top: 2px; }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text);
        }

        .logout-btn { color: #ff3b30; }

        .section-title {
            padding: 16px 20px 8px 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.15s;
        }

        .chat-item:hover { background: var(--bg-tertiary); }
        .chat-item.active { background: var(--bg-tertiary); }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--bg-tertiary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 500;
            background-size: cover;
            background-position: center;
        }

        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .chat-preview { font-size: 13px; color: var(--text-secondary); }
        .online-dot { width: 8px; height: 8px; background: var(--online); border-radius: 50%; display: inline-block; margin-right: 6px; }

        /* Чат */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .chat-header {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: none;
            width: 36px;
            height: 36px;
            background: var(--bg-tertiary);
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }

        .chat-header-info h2 { font-size: 17px; font-weight: 600; }
        .chat-header-info p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            max-width: 80%;
        }

        .message.sent { align-self: flex-end; }
        .message.received { align-self: flex-start; }

        .bubble {
            padding: 8px 14px;
            border-radius: 18px;
        }

        .sent .bubble {
            background: var(--sent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background: var(--received);
            border-bottom-left-radius: 4px;
        }

        .message-text { font-size: 15px; line-height: 1.4; }
        .message-meta {
            display: flex;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 4px;
            font-size: 10px;
            opacity: 0.7;
        }

        .input-area {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            background: var(--bg-tertiary);
            border-radius: 28px;
            padding: 6px 12px;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            outline: none;
            font-size: 16px;
            padding: 10px 0;
        }

        .input-wrapper button {
            background: var(--accent);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 360px;
        }

        .modal-header { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            margin: 0 auto 16px;
            background-size: cover;
            background-position: center;
        }

        /* Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 28px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            border-radius: 28px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            border-radius: 50%;
            transition: 0.2s;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Телефон */
        @media (max-width: 768px) {
            .chats-panel {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 100%;
                z-index: 100;
                transform: translateX(0);
                transition: transform 0.3s;
            }
            .chats-panel.hide { transform: translateX(-100%); }
            
            .chat-panel {
                width: 100%;
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 101;
                background: var(--bg);
            }
            .chat-panel.hide { display: none; }
            
            .back-btn { display: flex; }
            
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>

<div class="auth" id="authScreen">
    <div class="auth-card">
        <div class="auth-logo">envex</div>
        <input type="text" id="authUsername" class="auth-input" placeholder="@username" autocomplete="off">
        <input type="password" id="authPassword" class="auth-input" placeholder="Пароль">
        <input type="text" id="authName" class="auth-input" placeholder="Ваше имя" style="display: none;">
        <button id="authSubmitBtn" class="auth-btn">Войти</button>
        <div class="auth-switch" id="authSwitch">Нет аккаунта? <span>Создать</span></div>
        <div class="error-msg" id="errorMsg"></div>
    </div>
</div>

<div class="app" id="appScreen">
    <div class="container">
        <!-- Панель списка чатов -->
        <div class="chats-panel" id="chatsPanel">
            <div class="panel-header">
                <div class="current-user">
                    <div class="avatar" id="userAvatar" onclick="openAvatarModal()">?</div>
                    <div class="user-info">
                        <h3 id="userName"></h3>
                        <p>● онлайн</p>
                    </div>
                </div>
                <input type="text" id="searchInput" class="search-input" placeholder="Поиск">
                <div class="action-row">
                    <button class="action-btn" id="createGroupBtn">+ Группа</button>
                    <button class="action-btn" id="settingsBtn">⚙️</button>
                    <button class="action-btn logout-btn" id="logoutBtn">🚪</button>
                </div>
            </div>
            <div class="section-title">Чаты</div>
            <div class="chats-list" id="chatsList"></div>
        </div>
        
        <!-- Панель чата -->
        <div class="chat-panel hide" id="chatPanel">
            <div class="chat-header">
                <div class="back-btn" id="backBtn">←</div>
                <div class="chat-header-info">
                    <h2 id="chatName"></h2>
                    <p id="chatStatus"></p>
                </div>
            </div>
            <div class="messages" id="messagesList">
                <div class="empty-state">✨ Выберите чат</div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Сообщение">
                    <button id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Настройки</div>
        <div class="setting-row">
            <span>🌙 Тёмный режим</span>
            <label class="switch"><input type="checkbox" id="themeToggle"><span class="slider"></span></label>
        </div>
        <div class="setting-row">
            <span>🔔 Уведомления</span>
            <label class="switch"><input type="checkbox" id="notifToggle" checked><span class="slider"></span></label>
        </div>
        <button id="closeSettingsBtn" class="auth-btn" style="margin-top: 20px;">Готово</button>
    </div>
</div>

<div id="avatarModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Фото профиля</div>
        <div class="avatar-preview" id="avatarPreview"></div>
        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
        <button id="uploadAvatarBtn" class="auth-btn" style="margin-bottom: 10px;">📸 Загрузить</button>
        <button id="closeAvatarModal" class="auth-btn" style="background: var(--bg-tertiary); color: var(--text);">Отмена</button>
    </div>
</div>

<div id="groupModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Новая группа</div>
        <input type="text" id="groupNameInput" class="auth-input" placeholder="Название">
        <div class="section-title" style="margin: 16px 0 8px 0;">Участники</div>
        <div id="groupMembersList" style="max-height: 200px; overflow-y: auto;"></div>
        <button id="createGroupConfirm" class="auth-btn" style="margin-top: 20px;">Создать</button>
        <button id="closeGroupModal" class="auth-btn" style="margin-top: 10px; background: var(--bg-tertiary); color: var(--text);">Отмена</button>
    </div>
</div>

<script>
    let ws = null;
    let currentUser = null;
    let currentChat = null;
    let allUsers = [];
    let allGroups = [];
    let allMessages = {};
    let isLoginMode = true;
    let isConnecting = false;

    const SESSION_KEY = 'envex_user_data';

    function saveUserData(username, password, name) {
        localStorage.setItem(SESSION_KEY, JSON.stringify({ username, password, name, savedAt: Date.now() }));
    }

    function loadUserData() {
        const raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        try {
            const data = JSON.parse(raw);
            if (Date.now() - data.savedAt > 30 * 24 * 60 * 60 * 1000) {
                localStorage.removeItem(SESSION_KEY);
                return null;
            }
            return data;
        } catch(e) { return null; }
    }

    function clearUserData() { localStorage.removeItem(SESSION_KEY); }

    function showError(msg) {
        const errDiv = document.getElementById('errorMsg');
        errDiv.textContent = msg;
        setTimeout(() => errDiv.textContent = '', 3000);
    }

    function getWebSocketUrl() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${protocol}//${window.location.host}`;
    }

    function connectAndAuth(type, username, password, name) {
        if (isConnecting) return;
        isConnecting = true;
        const btn = document.getElementById('authSubmitBtn');
        btn.disabled = true;
        btn.textContent = 'Подключение...';
        
        ws = new WebSocket(getWebSocketUrl());
        
        ws.onopen = () => {
            if (type === 'login') {
                ws.send(JSON.stringify({ type: 'login', username, password }));
            } else {
                ws.send(JSON.stringify({ type: 'register', username, password, name: name || username.substring(1) }));
            }
        };
        
        ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                console.log('📨', data.type);
                
                if (data.type === 'logged_in' || data.type === 'registered') {
                    currentUser = data.username;
                    document.getElementById('userName').textContent = data.name;
                    const avatar = document.getElementById('userAvatar');
                    if (data.avatar) {
                        avatar.style.backgroundImage = `url(${data.avatar})`;
                        avatar.textContent = '';
                    } else {
                        avatar.style.backgroundImage = '';
                        avatar.textContent = data.name.charAt(0).toUpperCase();
                    }
                    saveUserData(username, password, data.name);
                    document.getElementById('authScreen').style.display = 'none';
                    document.getElementById('appScreen').style.display = 'block';
                    isConnecting = false;
                    btn.disabled = false;
                }
                
                if (data.type === 'users') { allUsers = data.users; renderChats(); }
                if (data.type === 'groups') { allGroups = data.groups; renderChats(); }
                
                if (data.type === 'history') {
                    allMessages = {};
                    data.messages.forEach(msg => {
                        const chatId = msg.isGroup ? msg.to : (msg.from === currentUser ? msg.to : msg.from);
                        if (!allMessages[chatId]) allMessages[chatId] = [];
                        allMessages[chatId].push(msg);
                    });
                    if (currentChat) renderMessages();
                }
                
                if (data.type === 'new_message') {
                    const msg = data.message;
                    const chatId = msg.isGroup ? msg.to : (msg.from === currentUser ? msg.to : msg.from);
                    if (!allMessages[chatId]) allMessages[chatId] = [];
                    allMessages[chatId].push(msg);
                    if (currentChat && currentChat.id === chatId) renderMessages();
                    renderChats();
                }
                
                if (data.type === 'error') {
                    showError(data.text);
                    isConnecting = false;
                    btn.disabled = false;
                }
            } catch(e) { console.error(e); }
        };
        
        ws.onerror = () => { showError('Ошибка подключения'); isConnecting = false; btn.disabled = false; };
        
        ws.onclose = () => {
            setTimeout(() => {
                if (currentUser) {
                    const saved = loadUserData();
                    if (saved) connectAndAuth('login', saved.username, saved.password, saved.name);
                }
            }, 2000);
        };
    }
    
    function checkSavedSession() {
        const saved = loadUserData();
        if (saved && saved.username && saved.password) {
            connectAndAuth('login', saved.username, saved.password, saved.name);
            return true;
        }
        return false;
    }
    
    function renderChats() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let chats = [];
        
        allUsers.filter(u => u.username !== currentUser).forEach(user => {
            if (!searchTerm || user.username.toLowerCase().includes(searchTerm) || (user.name && user.name.toLowerCase().includes(searchTerm))) {
                chats.push({ type: 'user', id: user.username, name: user.name || user.username.substring(1), avatar: user.avatar, online: user.online });
            }
        });
        
        allGroups.forEach(group => {
            if (!searchTerm || group.name.toLowerCase().includes(searchTerm)) {
                chats.push({ type: 'group', id: group.id, name: group.name, avatar: group.avatar });
            }
        });
        
        const container = document.getElementById('chatsList');
        if (chats.length === 0) {
            container.innerHTML = '<div class="empty-state">👀 Никого не найдено</div>';
            return;
        }
        
        container.innerHTML = chats.map(chat => `
            <div class="chat-item ${currentChat && currentChat.id === chat.id ? 'active' : ''}" onclick="selectChat('${chat.type}', '${chat.id}', '${chat.name.replace(/'/g, "\\'")}')">
                <div class="chat-avatar" style="${chat.avatar ? `background-image: url(${chat.avatar}); background-size: cover;` : ''}">
                    ${!chat.avatar ? (chat.type === 'user' ? (chat.name?.charAt(0) || 'U').toUpperCase() : '👥') : ''}
                </div>
                <div class="chat-info">
                    <div class="chat-name">${chat.name}</div>
                    <div class="chat-preview">${chat.type === 'user' ? chat.id : (chat.online !== undefined ? (chat.online ? '● онлайн' : 'оффлайн') : 'группа')}</div>
                </div>
            </div>
        `).join('');
    }
    
    window.selectChat = (type, id, name) => {
        currentChat = { type, id, name };
        document.getElementById('chatName').textContent = name;
        
        if (type === 'user') {
            const user = allUsers.find(u => u.username === id);
            document.getElementById('chatStatus').innerHTML = user?.online ? '● онлайн' : 'оффлайн';
        } else {
            document.getElementById('chatStatus').innerHTML = 'групповой чат';
        }
        
        // На телефоне: прячем список чатов, показываем чат
        if (window.innerWidth <= 768) {
            document.getElementById('chatsPanel').classList.add('hide');
            document.getElementById('chatPanel').classList.remove('hide');
        }
        
        renderChats();
        renderMessages();
    };
    
    function renderMessages() {
        const msgs = allMessages[currentChat?.id] || [];
        const container = document.getElementById('messagesList');
        
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state">💬 Нет сообщений</div>';
            return;
        }
        
        container.innerHTML = msgs.map(msg => {
            const isSent = msg.from === currentUser;
            let statusIcon = '';
            if (isSent) {
                if (msg.status === 'sent') statusIcon = '✓';
                else if (msg.status === 'delivered') statusIcon = '✓✓';
                else if (msg.status === 'read') statusIcon = '✓✓✓';
            }
            
            return `
                <div class="message ${isSent ? 'sent' : 'received'}">
                    <div class="bubble">
                        ${!isSent && currentChat?.type === 'group' ? `<div style="font-size: 11px; font-weight: 600; margin-bottom: 4px;">${msg.from}</div>` : ''}
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-meta">
                            <span>${msg.timeStr || new Date(msg.time).toLocaleTimeString()}</span>
                            ${statusIcon ? `<span>${statusIcon}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        container.scrollTop = container.scrollHeight;
        
        msgs.forEach(msg => {
            if (!msg.read && msg.from !== currentUser && ws?.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'read', messageId: msg.id }));
            }
        });
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChat || !ws || ws.readyState !== WebSocket.OPEN) return;
        
        if (currentChat.type === 'user') {
            ws.send(JSON.stringify({ type: 'message', to: currentChat.id, text }));
        } else {
            ws.send(JSON.stringify({ type: 'group_message', groupId: currentChat.id, text }));
        }
        input.value = '';
    }
    
    function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
    
    function logout() {
        if (confirm('Выйти?')) {
            clearUserData();
            if (ws) ws.close();
            currentUser = null;
            currentChat = null;
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
        }
    }
    
    function toggleTheme() {
        if (document.getElementById('themeToggle').checked) {
            document.body.classList.add('dark');
            localStorage.setItem('envex_theme', 'dark');
        } else {
            document.body.classList.remove('dark');
            localStorage.setItem('envex_theme', 'light');
        }
    }
    
    function loadTheme() {
        if (localStorage.getItem('envex_theme') === 'dark') {
            document.getElementById('themeToggle').checked = true;
            document.body.classList.add('dark');
        }
    }
    
    // Модалки
    function openAvatarModal() { document.getElementById('avatarModal').style.display = 'flex'; }
    function openGroupModal() {
        const listDiv = document.getElementById('groupMembersList');
        listDiv.innerHTML = allUsers.filter(u => u.username !== currentUser).map(user => `
            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border);">
                <span>${user.name || user.username} (${user.username})</span>
                <input type="checkbox" value="${user.username}" class="group-checkbox">
            </div>
        `).join('');
        document.getElementById('groupModal').style.display = 'flex';
    }
    
    // Инициализация
    document.getElementById('authSwitch').onclick = () => {
        isLoginMode = !isLoginMode;
        const btn = document.getElementById('authSubmitBtn');
        const nameField = document.getElementById('authName');
        const switchText = document.getElementById('authSwitch');
        if (isLoginMode) {
            btn.textContent = 'Войти';
            switchText.innerHTML = 'Нет аккаунта? <span>Создать</span>';
            nameField.style.display = 'none';
        } else {
            btn.textContent = 'Создать аккаунт';
            switchText.innerHTML = 'Уже есть аккаунт? <span>Войти</span>';
            nameField.style.display = 'block';
        }
    };
    
    document.getElementById('authSubmitBtn').onclick = () => {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value;
        const name = document.getElementById('authName').value.trim();
        if (!username || !password) return showError('Заполните поля');
        if (!username.startsWith('@')) return showError('Username должен начинаться с @');
        if (!isLoginMode && !name) return showError('Введите имя');
        connectAndAuth(isLoginMode ? 'login' : 'register', username, password, name);
    };
    
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').style.display = 'flex';
    document.getElementById('closeSettingsBtn').onclick = () => document.getElementById('settingsModal').style.display = 'none';
    document.getElementById('createGroupBtn').onclick = openGroupModal;
    document.getElementById('closeGroupModal').onclick = () => document.getElementById('groupModal').style.display = 'none';
    document.getElementById('uploadAvatarBtn').onclick = () => document.getElementById('avatarInput').click();
    document.getElementById('closeAvatarModal').onclick = () => document.getElementById('avatarModal').style.display = 'none';
    document.getElementById('themeToggle').onchange = toggleTheme;
    document.getElementById('backBtn').onclick = () => {
        document.getElementById('chatsPanel').classList.remove('hide');
        document.getElementById('chatPanel').classList.add('hide');
        currentChat = null;
    };
    document.getElementById('searchInput').oninput = () => renderChats();
    
    document.getElementById('createGroupConfirm').onclick = () => {
        const name = document.getElementById('groupNameInput').value.trim();
        if (!name) return alert('Введите название');
        const members = Array.from(document.querySelectorAll('.group-checkbox:checked')).map(cb => cb.value);
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'create_group', name, members }));
        }
        document.getElementById('groupModal').style.display = 'none';
        document.getElementById('groupNameInput').value = '';
    };
    
    document.getElementById('avatarInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const avatarUrl = ev.target.result;
                document.getElementById('avatarPreview').style.backgroundImage = `url(${avatarUrl})`;
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'update_avatar', avatar: avatarUrl }));
                }
                const avatarDiv = document.getElementById('userAvatar');
                avatarDiv.style.backgroundImage = `url(${avatarUrl})`;
                avatarDiv.textContent = '';
            };
            reader.readAsDataURL(file);
        }
    };
    
    if (Notification.permission === 'default') Notification.requestPermission();
    loadTheme();
    checkSavedSession();
</script>
</body>
</html>
